name: Publish Chrome Extension

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chrome-extension-publish
  cancel-in-progress: false

jobs:
  publish:

    # Evita executar novamente quando o próprio Action fizer o commit da versão
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Validate manifest
        run: |
          test -f manifest.json
          jq -e '.manifest_version' manifest.json
          jq -e '.version' manifest.json


      - name: Auto increment version
        id: version
        run: |
          CURRENT=$(jq -r '.version' manifest.json)

          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$CURRENT"

          BUILD=$((BUILD + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"

          echo "New version: $NEW_VERSION"

          jq --arg v "$NEW_VERSION" '.version=$v' manifest.json > manifest.tmp

          mv manifest.tmp manifest.json

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT


      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json

          git commit -m "chore: bump version ${{ steps.version.outputs.version }}" || exit 0

          git push


      - name: Create ZIP
        run: |
          zip -r extension.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "README*" \
            -x "LICENSE*" \
            -x "*.md" \
            -x "node_modules/*"


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip


      # NOVO PASSO: Cancela qualquer versão em rascunho ou em análise pendente
      - name: Discard pending review
        run: |
          cat << 'EOF' > discard.js
          const fs = require('fs');

          async function main() {
            const clientId = process.env.CLIENT_ID;
            const clientSecret = process.env.CLIENT_SECRET;
            const refreshToken = process.env.REFRESH_TOKEN;
            const extensionId = process.env.EXTENSION_ID;

            // 1. Obter Access Token atualizado
            const tokenResponse = await fetch('https://oauth2.googleapis.com/token', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: new URLSearchParams({
                client_id: clientId,
                client_secret: clientSecret,
                refresh_token: refreshToken,
                grant_type: 'refresh_token'
              })
            });
            const tokenData = await tokenResponse.json();
            if (!tokenData.access_token) {
              console.error('Erro ao obter access token:', tokenData);
              process.exit(1);
            }

            // 2. Chamar endpoint da Chrome Web Store para descartar rascunho/análise pendente
            console.log('Tentando descartar rascunho ou análise existente...');
            const discardResponse = await fetch(`https://www.googleapis.com/chromewebstore/v1.1/items/${extensionId}/discardDraft`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${tokenData.access_token}`,
                'x-goog-api-version': '2'
              }
            });

            const discardData = await discardResponse.json();
            
            // O Google retorna erro se não houver rascunho para descartar, o que é esperado se a loja estiver limpa
            if (discardResponse.ok) {
              console.log('Análise/Rascunho anterior cancelado com sucesso.');
            } else {
              console.log('Nenhuma análise ativa encontrada para descartar ou ação não necessária:', discardData.error?.message || discardData);
            }
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF
          node discard.js
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}


      - name: Publish Chrome Extension
        uses: mobilefirstllc/cws-publish@2.1.1
        with:
          action: publish

          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}

          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}

          zip_file: extension.zip


      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}

          name: XCAD v${{ steps.version.outputs.version }}

          generate_release_notes: true

          files: |
            extension.zip
