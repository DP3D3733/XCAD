name: Publish Chrome Extension

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: chrome-extension-publish
  cancel-in-progress: false

jobs:
  publish:

    # Evita executar novamente quando o próprio Action fizer o commit da versão
    if: github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    timeout-minutes: 20

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Validate manifest
        run: |
          test -f manifest.json
          jq -e '.manifest_version' manifest.json
          jq -e '.version' manifest.json

      - name: Force Cancel Pending Review via API v2
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          echo "Resgatando Access Token temporário..."
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id=$CLIENT_ID \
            -d client_secret=$CLIENT_SECRET \
            -d refresh_token=$REFRESH_TOKEN \
            -d grant_type=refresh_token | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" == "null" ]; then
            echo "❌ Falha ao obter Access Token. Verifique suas credenciais nos Secrets."
            exit 1
          fi

          echo "Buscando o Publisher ID correto associado à conta..."
          # Obtém a lista de publishers e pega o ID numérico do primeiro disponível
          PUBLISHER_ID=$(curl -s -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://chromewebstore.googleapis.com/v2/publishers" | jq -r '.publishers[0].name | split("/")[-1]')

          if [ -z "$PUBLISHER_ID" ] || [ "$PUBLISHER_ID" == "null" ]; then
            echo "⚠️ Não foi possível mapear o Publisher ID automaticamente. Usando 'me' como fallback."
            PUBLISHER_ID="me"
          else
            echo "✅ Publisher ID encontrado: $PUBLISHER_ID"
          fi

          echo "Cancelando submissão pendente na Chrome Web Store..."
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Length: 0" \
            "https://chromewebstore.googleapis.com/v2/publishers/${PUBLISHER_ID}/items/${EXTENSION_ID}:cancelSubmission")

          echo "Resposta da API (Status $HTTP_STATUS):"
          cat response.json

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Submissão cancelada ou nenhuma análise pendente ativa."
          else
            echo "⚠️ A API retornou status $HTTP_STATUS."
            echo "Se o erro for 403, verifique se o seu REFRESH_TOKEN possui o escopo 'https://www.googleapis.com/auth/chromewebstore'."
          fi
      - name: Auto increment version
        id: version
        run: |
          CURRENT=$(jq -r '.version' manifest.json)

          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$CURRENT"

          BUILD=$((BUILD + 1))

          NEW_VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"

          echo "New version: $NEW_VERSION"

          jq --arg v "$NEW_VERSION" '.version=$v' manifest.json > manifest.tmp

          mv manifest.tmp manifest.json

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT


      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json

          git commit -m "chore: bump version ${{ steps.version.outputs.version }}" || exit 0

          git push


      - name: Create ZIP
        run: |
          zip -r extension.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".gitignore" \
            -x "README*" \
            -x "LICENSE*" \
            -x "*.md" \
            -x "node_modules/*"


      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip


     
      - name: Publish Chrome Extension
        uses: mobilefirstllc/cws-publish@2.1.1
        with:
          action: publish

          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}

          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}

          zip_file: extension.zip


      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}

          name: XCAD v${{ steps.version.outputs.version }}

          generate_release_notes: true

          files: |
            extension.zip
