name: Chrome Web Store Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite disparar manualmente pelo painel do GitHub se necessário

jobs:
  deploy:
    name: Build, Cancel Pending and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Substitua este comando pelo fluxo real de build do seu projeto (ex: npm ci && npm run build)
      # Aqui estamos apenas compactando os arquivos do repositório
      - name: Build Extension ZIP
        run: |
          zip -r extension.zip . -x "*.git*" ".github*"

      # Usa o curl e o jq nativos para chamar a API v2 e destravar a loja antes do upload
      - name: Force Cancel Pending Review via API v2
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          echo "Resgatando Access Token temporário..."
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d client_id=$CLIENT_ID \
            -d client_secret=$CLIENT_SECRET \
            -d refresh_token=$REFRESH_TOKEN \
            -d grant_type=refresh_token | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" == "null" ]; then
            echo "❌ Falha ao obter Access Token. Verifique suas credenciais nos Secrets."
            exit 1
          fi

          echo "Cancelando submissão pendente na Chrome Web Store..."
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Length: 0" \
            "https://chromewebstore.googleapis.com/v2/publishers/me/items/${EXTENSION_ID}:cancelSubmission")

          echo "Resposta da API (Status $HTTP_STATUS):"
          cat response.json

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Submissão cancelada ou nenhuma análise pendente ativa."
          else
            echo "⚠️ A API retornou status $HTTP_STATUS. Prosseguindo para tentar o upload..."
          fi

      # Faz o upload oficial utilizando a sua action atual
      - name: Upload & Publish Extension
        uses: mobilefirstllc/cws-publish@2.1.1
        with:
          action: publish
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file: extension.zip
